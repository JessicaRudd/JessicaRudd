name: Latest Substack Posts

on:
  schedule:
    - cron: '0 0 * * *' # Updates daily at midnight
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Update README
        run: |
          python << END
          import requests
          import sys

          # 1. Use the RSS2JSON proxy to bypass Substack's Cloudflare block
          rss_url = "https://funsizedatabytes.substack.com/feed"
          proxy_url = f"https://api.rss2json.com/v1/api.json?rss_url={rss_url}"
          
          try:
              print(f"Fetching via Proxy: {proxy_url}")
              response = requests.get(proxy_url, timeout=20)
              response.raise_for_status()
              data = response.json()
              
              if data.get("status") != "ok":
                  print(f"Proxy error: {data.get('message')}")
                  sys.exit(1)

              items = data.get("items", [])[:3]
              if not items:
                  print("No posts found in proxy response.")
                  sys.exit(1)

              # 2. Build the Markdown list
              links = []
              for post in items:
                  title = post.get('title')
                  link = post.get('link')
                  links.append(f"- [{title}]({link})")

              new_block = "\n" + "\n".join(links) + "\n\n"

              # 3. Target and Update the README file
              with open("README.md", "r", encoding="utf-8") as f:
                  lines = f.readlines()

              start_tag = ""
              end_tag = ""
              
              start_idx = next((i for i, line in enumerate(lines) if start_tag in line), -1)
              end_idx = next((i for i, line in enumerate(lines) if end_tag in line), -1)

              if start_idx != -1 and end_idx != -1:
                  # Replace the section between the tags
                  lines[start_idx:end_idx+1] = [new_block]
                  with open("README.md", "w", encoding="utf-8") as f:
                      f.writelines(lines)
                  print("README updated successfully.")
              else:
                  print("Error: Markers not found in README.md")
                  sys.exit(1)
          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          END

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local
