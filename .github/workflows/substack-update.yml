name: Latest Substack Posts
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Update README
        run: |
          python << END
          import feedparser
          import requests

          # Substack RSS needs a real User-Agent
          headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"}
          response = requests.get("https://funsizedatabytes.substack.com/feed", headers=headers)
          feed = feedparser.parse(response.text)
          
          posts = feed.entries[:3]
          if not posts:
              print("No posts found or feed inaccessible.")
              exit(1)

          links = [f"- [{p.title}]({p.link})" for p in posts]
          new_content = "\n" + "\n".join(links) + "\n"

          with open("README.md", "r", encoding="utf-8") as f:
              lines = f.readlines()

          # Identify where to inject
          start_idx = -1
          end_idx = -1
          for i, line in enumerate(lines):
              if "" in line:
                  start_idx = i
              if "" in line:
                  end_idx = i

          if start_idx != -1 and end_idx != -1:
              # Replace the slice with the new block
              lines[start_idx:end_idx+1] = [new_content + "\n"]
              with open("README.md", "w", encoding="utf-8") as f:
                  f.writelines(lines)
              print("README updated successfully.")
          else:
              print("Markers not found in README. Check for HTML comments.")
              exit(1)
          END

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Update Substack posts safely" || exit 0
          git push
