name: Latest Substack Posts

on:
  schedule:
    - cron: '0 0 * * *' # Updates daily at midnight
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history for stable git operations

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Sync with Remote
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main

      - name: Update README
        run: |
          python << END
          import requests
          import sys

          # 1. Fetch via Proxy to bypass Cloudflare 403
          rss_url = "https://funsizedatabytes.substack.com/feed"
          proxy_url = f"https://api.rss2json.com/v1/api.json?rss_url={rss_url}"
          
          try:
              print(f"Fetching: {proxy_url}")
              response = requests.get(proxy_url, timeout=20)
              response.raise_for_status()
              data = response.json()
              items = data.get("items", [])[:3]
              
              if not items:
                  print("No posts found.")
                  sys.exit(1)

              # 2. Format the links
              links = [f"- [{p.get('title')}]({p.get('link')})" for p in items]
              
              # 3. Define the Markers (CRITICAL: Do not leave these empty)
              # PARSER-PROOF TAGS
              start_tag = "<!" + "-- BLOG-POST-LIST:START --" + ">"
              end_tag = "<!" + "-- BLOG-POST-LIST:END --" + ">"
              
              # Build the block (putting the tags back in so they persist)
              new_block = f"{start_tag}\n\n" + "\n".join(links) + f"\n\n{end_tag}"

              with open("README.md", "r", encoding="utf-8") as f:
                  content = f.read()

              # 4. Perform the "Sandwich" replacement
              if start_tag in content and end_tag in content:
                  header = content.split(start_tag)[0]
                  footer = content.split(end_tag)[1]
                  new_readme = header + new_block + footer
                  
                  with open("README.md", "w", encoding="utf-8") as f:
                      f.write(new_readme)
                  print("README updated successfully.")
              else:
                  print("Markers not found in README. Make sure they are in the file.")
                  sys.exit(1)
          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          END

      - name: Commit and Push
        run: |
          git add README.md
          git commit -m "Update Substack posts" || echo "No changes to commit"
          git push origin main
