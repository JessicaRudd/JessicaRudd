name: Latest Substack Posts

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Sync with Remote
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main

      - name: Update README
        run: |
          python << 'EOF'
          import requests
          import sys

          rss_url = "https://funsizedatabytes.substack.com/feed"
          proxy_url = f"https://api.rss2json.com/v1/api.json?rss_url={rss_url}"
          
          try:
              response = requests.get(proxy_url, timeout=20)
              response.raise_for_status()
              data = response.json()
              items = data.get("items", [])[:3]
              
              if not items:
                  print("No posts found.")
                  sys.exit(1)

              # Format the 3 most recent links
              links = [f"- [{p.get('title')}]({p.get('link')})" for p in items]
              
              # VISIBLE MARKERS (No HTML comments to get stripped)
              start_tag = "**👇 Latest Articles 👇**"
              end_tag = "**👆 End Articles 👆**"
              
              with open("README.md", "r", encoding="utf-8") as f:
                  content = f.read()

              # The Overwrite Logic: 
              # 1. Take everything before the start tag
              # 2. Add the start tag, the new links, and the end tag
              # 3. Take everything after the end tag
              if start_tag in content and end_tag in content:
                  header = content.split(start_tag)[0]
                  footer = content.split(end_tag)[1]
                  
                  new_block = start_tag + "\n\n" + "\n".join(links) + "\n\n" + end_tag
                  new_readme = header + new_block + footer
                  
                  with open("README.md", "w", encoding="utf-8") as f:
                      f.write(new_readme)
                  print("README successfully overwritten with latest posts.")
              else:
                  print("Visible markers not found in README. Please add them.")
                  sys.exit(1)
          except Exception as e:
              print(f"Error: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push
        run: |
          git add README.md
          # This prevents failure if the Substack hasn't been updated
          git commit -m "Update Substack posts" || echo "No changes to commit"
          git push origin main
